<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro TTY Tree Animation</title>
    <style>
        @import url('https://fonts.fontsource.org/fontsource-vt323/400.css');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', monospace;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            filter: blur(0.5px) contrast(1.2);
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0) 50%,
                rgba(0, 0, 0, 0.2) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 11;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.9; }
            100% { opacity: 0.95; }
        }

        .loading-text {
            position: absolute;
            bottom: 20px;
            color: #00ff41;
            font-size: 1.5rem;
            text-shadow: 0 0 5px #00ff41;
            z-index: 5;
            opacity: 0.7;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="treeCanvas"></canvas>
    <div class="scanlines"></div>
    <div class="crt-overlay"></div>
    <div class="loading-text" id="statusText">INITIALIZING SYSTEM...</div>
</div>

<script>
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');

    let width, height;
    let treePixels = [];
    let animationFrameId;
    let startTime = null;
    const treeDuration = 15000;
    let treeComplete = false;
    
    // Bird image
    const birdImg = new Image();
    birdImg.src = 'asciibird.png';
    
    // Birds array
    let birds = [];
    const NUM_BIRDS = 8;

    const COLOR_MAIN = '#00ff41';
    const COLOR_DIM = '#008f11';

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initTree();
        initBirds();
    }

    function generateTreeMask(x, y, len, angle, depth, branches) {
        if (depth === 0) return;

        const x2 = x + Math.cos(angle) * len;
        const y2 = y + Math.sin(angle) * len;

        branches.push({ x1: x, y1: y, x2: x2, y2: y2, width: Math.max(1, depth * 1.5) });

        generateTreeMask(x2, y2, len * 0.75, angle - 0.5, depth - 1, branches);
        generateTreeMask(x2, y2, len * 0.75, angle + 0.5, depth - 1, branches);
        
        if (Math.random() > 0.3) {
             generateTreeMask(x2, y2, len * 0.6, angle - 0.8, depth - 1, branches);
        }
        if (Math.random() > 0.3) {
             generateTreeMask(x2, y2, len * 0.6, angle + 0.8, depth - 1, branches);
        }
    }

    function initTree() {
        treePixels = [];
        const branches = [];
        
        const startX = width / 2;
        const startY = height - 50;
        const initialLen = Math.min(width, height) * 0.15;
        
        generateTreeMask(startX, startY, initialLen, -Math.PI / 2, 10, branches);

        const grid = new Array(height).fill(0).map(() => new Array(width).fill(false));

        branches.forEach(b => {
            drawLineOnGrid(grid, b.x1, b.y1, b.x2, b.y2, b.width);
        });

        for (let y = 0; y < height; y++) {
            let segments = [];
            let startX = -1;
            for (let x = 0; x < width; x++) {
                if (grid[y][x]) {
                    if (startX === -1) startX = x;
                } else {
                    if (startX !== -1) {
                        segments.push({ x: startX, w: x - startX, y: y });
                        startX = -1;
                    }
                }
            }
            if (startX !== -1) {
                segments.push({ x: startX, w: width - startX, y: y });
            }
            if (segments.length > 0) {
                treePixels.push({ y: y, segments: segments });
            }
        }
    }

    function drawLineOnGrid(grid, x0, y0, x1, y1, thickness) {
        x0 = Math.floor(x0); y0 = Math.floor(y0);
        x1 = Math.floor(x1); y1 = Math.floor(y1);

        const dx = Math.abs(x1 - x0);
        const dy = Math.abs(y1 - y0);
        const sx = (x0 < x1) ? 1 : -1;
        const sy = (y0 < y1) ? 1 : -1;
        let err = dx - dy;

        while (true) {
            for (let i = -Math.floor(thickness/2); i <= Math.floor(thickness/2); i++) {
                for (let j = -Math.floor(thickness/2); j <= Math.floor(thickness/2); j++) {
                    if (y0 + j >= 0 && y0 + j < height && x0 + i >= 0 && x0 + i < width) {
                        grid[y0 + j][x0 + i] = true;
                    }
                }
            }

            if ((x0 === x1) && (y0 === y1)) break;
            const e2 = 2 * err;
            if (e2 > -dy) { err -= dy; x0 += sx; }
            if (e2 < dx) { err += dx; y0 += sy; }
        }
    }

    function initBirds() {
        birds = [];
        const treeCenterX = width / 2;
        const treeTopY = height * 0.15;
        
        for (let i = 0; i < NUM_BIRDS; i++) {
            const fromLeft = Math.random() > 0.5;
            birds.push({
                x: fromLeft ? -100 : width + 100,
                y: Math.random() * height * 0.5 + height * 0.1,
                targetX: treeCenterX + (Math.random() - 0.5) * 300,
                targetY: treeTopY + Math.random() * 200,
                speed: 2 + Math.random() * 2,
                wingPhase: Math.random() * Math.PI * 2,
                size: 20 + Math.random() * 15,
                arrived: false,
                orbitAngle: Math.random() * Math.PI * 2,
                orbitRadius: 50 + Math.random() * 100
            });
        }
    }

    function updateBirds() {
        const treeCenterX = width / 2;
        const treeTopY = height * 0.25;

        birds.forEach(bird => {
            if (!bird.arrived) {
                const dx = bird.targetX - bird.x;
                const dy = bird.targetY - bird.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 10) {
                    bird.arrived = true;
                } else {
                    bird.x += (dx / dist) * bird.speed;
                    bird.y += (dy / dist) * bird.speed;
                }
            } else {
                bird.orbitAngle += 0.02;
                bird.x = treeCenterX + Math.cos(bird.orbitAngle) * bird.orbitRadius;
                bird.y = treeTopY + Math.sin(bird.orbitAngle) * bird.orbitRadius * 0.5;
            }
            
            bird.wingPhase += 0.3;
        });
    }

    function drawBird(bird) {
        ctx.save();
        ctx.translate(bird.x, bird.y);
        
        const direction = bird.x < width / 2 ? 1 : -1;
        ctx.scale(direction * bird.size / 50, bird.size / 50);
        
        const wingOffset = Math.sin(bird.wingPhase) * 10;
        
        ctx.fillStyle = COLOR_MAIN;
        ctx.shadowBlur = 8;
        ctx.shadowColor = COLOR_MAIN;
        
        // Draw pixel art bird using rectangles
        // Body
        ctx.fillRect(-15, -5, 30, 15);
        // Head
        ctx.fillRect(10, -10, 15, 12);
        // Beak
        ctx.fillRect(25, -5, 10, 5);
        // Left wing (animated)
        ctx.fillRect(-10, -20 - wingOffset, 20, 15);
        // Right wing (animated)
        ctx.fillRect(-5, -15 + wingOffset, 15, 10);
        // Tail
        ctx.fillRect(-25, 0, 15, 8);
        // Eye
        ctx.fillStyle = '#000';
        ctx.fillRect(18, -7, 4, 4);
        
        ctx.restore();
    }

    function draw(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / treeDuration, 1);

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);

        const totalLines = treePixels.length;
        const linesToDraw = Math.floor(totalLines * progress);

        ctx.fillStyle = COLOR_MAIN;
        ctx.shadowBlur = 10;
        ctx.shadowColor = COLOR_MAIN;

        const startIndex = Math.max(0, totalLines - linesToDraw);
        
        for (let i = startIndex; i < totalLines; i++) {
            const row = treePixels[i];
            row.segments.forEach(seg => {
                const lineHeight = 2; 
                const gap = 2;
                
                for (let lx = seg.x; lx < seg.x + seg.w; lx += (lineHeight + gap)) {
                    const drawW = Math.min(lineHeight, seg.x + seg.w - lx);
                    ctx.fillRect(lx, row.y, drawW, 1);
                }
            });
        }

        // Draw birds after tree is complete
        if (progress >= 1) {
            if (!treeComplete) {
                treeComplete = true;
                initBirds();
            }
            
            updateBirds();
            
            birds.forEach(bird => {
                drawBird(bird);
            });
        }

        // Glitch effect
        if (Math.random() > 0.98) {
            const glitchY = Math.random() * height;
            ctx.fillStyle = `rgba(0, 255, 65, 0.3)`;
            ctx.fillRect(0, glitchY, width, 2);
        }

        // Status text
        if (progress < 0.3) statusText.innerText = "LOADING ASSETS...";
        else if (progress < 0.6) statusText.innerText = "RENDERING GEOMETRY...";
        else if (progress < 0.9) statusText.innerText = "COMPILING BIOMASS...";
        else if (progress < 1.0) statusText.innerText = "FINALIZING...";
        else {
            statusText.innerText = "SYSTEM READY. BIRDS DEPLOYED.";
            statusText.style.animation = "blink 1s infinite";
        }

        animationFrameId = requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
</script>

</body>
</html>
